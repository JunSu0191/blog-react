<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>default-post</title>
    <style>
      :root {
        color-scheme: light;
        --primary: hsl(222.2 47.4% 11.2%);
        --primary-foreground: hsl(210 40% 98%);
        --glow: rgba(148, 163, 184, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        display: grid;
        place-items: center;
        font-family:
          "Pretendard Variable",
          "Pretendard",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--primary-foreground);
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.1), transparent 24%),
          radial-gradient(circle at 82% 24%, rgba(255, 255, 255, 0.08), transparent 22%),
          radial-gradient(circle at 50% 120%, rgba(255, 255, 255, 0.12), transparent 34%),
          var(--primary);
      }

      .mark {
        position: relative;
        padding: 34px 56px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        box-shadow:
          0 24px 70px rgba(15, 23, 42, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
      }

      .mark::before {
        content: "";
        position: absolute;
        inset: -18px;
        border-radius: inherit;
        background: radial-gradient(circle, var(--glow), transparent 68%);
        z-index: -1;
      }

      h1 {
        margin: 0;
        font-size: 92px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.06em;
      }
    </style>
  </head>
  <body>
    <div class="mark">
      <h1>Blog Pause</h1>
    </div>
  </body>
</html>
