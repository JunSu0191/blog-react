<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/blog-pause-icon-tight.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/blog-pause-icon-tight.png" />
    <link rel="shortcut icon" href="/blog-pause-icon-tight.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/blog-pause-icon-tight.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta
      name="description"
      content="blog-pause에서 게시글을 읽고 공유할 수 있습니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="blog-pause" />
    <meta property="og:title" content="blog-pause" />
    <meta
      property="og:description"
      content="blog-pause에서 게시글을 읽고 공유할 수 있습니다."
    />
    <meta property="og:image" content="/default-post.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="blog-pause" />
    <meta
      name="twitter:description"
      content="blog-pause에서 게시글을 읽고 공유할 수 있습니다."
    />
    <meta name="twitter:image" content="/default-post.png" />
    <script>
      (() => {
        const storageKey = "ui.theme";
        const stored = window.localStorage.getItem(storageKey);
        const theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

        document.documentElement.classList.toggle("dark", theme === "dark");
        document.body?.classList.toggle("dark", theme === "dark");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <title>blog-pause</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
