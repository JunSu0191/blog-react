name: Deploy Frontend

on:
  workflow_dispatch:

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_PATH: /var/www/blog-front
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: /api
          VITE_WEB_BASE_URL: https://blog-pause.com
          VITE_AUTH_REFRESH_URL: /api/auth/refresh
          VITE_WS_URL: wss://blog-pause.com/ws
          VITE_STOMP_DEBUG: "false"
          VITE_DEV_USER_ID: ""
          VITE_SENTRY_DSN: ""
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: blog-pause@production
          VITE_SENTRY_TRACES_SAMPLE_RATE: "0"
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to EC2
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT:-22} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15" \
            dist/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
